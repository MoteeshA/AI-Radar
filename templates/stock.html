<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ symbol }} · Neural Trading Terminal | Pro</title>
    
    <!-- Plotly + Tailwind + Font Awesome + GSAP -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #03050b;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            z-index: -2;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56,189,248,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: subtleMove 30s linear infinite;
        }
        
        @keyframes subtleMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: rgba(56, 189, 248, 0.15);
            border-radius: 50%;
            animation: gentleFloat 20s infinite;
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            15% { opacity: 0.3; }
            85% { opacity: 0.3; }
            100% { transform: translateY(-80px) translateX(40px); opacity: 0; }
        }
        
        .glass-card {
            background: rgba(10, 20, 35, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.25s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-1px);
        }
        
        .signal-buy { background: linear-gradient(135deg, #15803d, #22c55e); }
        .signal-sell { background: linear-gradient(135deg, #b91c1c, #ef4444); }
        .signal-hold { background: linear-gradient(135deg, #854d0e, #eab308); }
        
        .timeframe-btn {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(56, 189, 248, 0.25);
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
        }
        
        .timeframe-btn.active {
            background: #0284c7;
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56,189,248,0.3);
        }
        
        .timeframe-btn:hover:not(.active) {
            background: #1e3a5f;
            border-color: #38bdf8;
        }
        
        .indicator-toggle {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(56, 189, 248, 0.25);
            transition: all 0.2s;
            cursor: pointer;
            font-size: 11px;
        }
        
        .indicator-toggle.active {
            background: #0284c7;
            border-color: #38bdf8;
        }
        
        .chart-container {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(56, 189, 248, 0.3);
            background: #010514;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.08);
        }
        
        .loading-skeleton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 3px solid #ef4444;
            padding: 10px 16px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-size: 12px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes priceFlash {
            0% { opacity: 0.6; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .price-update { animation: priceFlash 0.25s ease; }
        
        .modebar {
            background: rgba(15, 25, 45, 0.85) !important;
            backdrop-filter: blur(8px);
            border-radius: 16px !important;
            padding: 0 10px !important;
            border: 1px solid rgba(56, 189, 248, 0.3) !important;
        }
        .modebar-btn path { fill: #94a3b8; }
        .modebar-btn:hover path { fill: #38bdf8; }
    </style>
</head>
<body>
    
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>
    
    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-[#020617]/85 border-b border-[#38bdf8]/20 px-5 md:px-8 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center">
                <i class="fas fa-brain text-white text-xs"></i>
            </div>
            <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent">NEURAL TERMINAL</span>
            <span class="hidden md:inline-block text-[10px] bg-cyan-500/20 px-2 py-0.5 rounded-full border border-cyan-500/40">PRO</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="hidden md:flex items-center gap-2 bg-slate-900/60 px-3 py-1.5 rounded-full">
                <i class="fas fa-chart-line text-cyan-400 text-[10px]"></i>
                <span class="text-[11px] font-mono text-cyan-300" id="liveTime"></span>
            </div>
            <a href="/" class="flex items-center gap-2 bg-slate-800/60 hover:bg-slate-700 transition px-3 py-1.5 rounded-full text-xs font-medium border border-white/10">
                <i class="fas fa-arrow-left text-cyan-300 text-[10px]"></i> Dashboard
            </a>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-4 md:px-6 py-5">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-5">
            <div>
                <div class="flex items-center gap-2 flex-wrap">
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent" id="symbolTitle">{{ symbol }}</h1>
                    <span class="text-[10px] font-mono bg-cyan-500/20 px-2 py-1 rounded-full border border-cyan-500/30">
                        <i class="fas fa-chart-line mr-1"></i> NSE
                    </span>
                    <span id="livePriceBadge" class="text-[11px] font-mono bg-emerald-500/20 px-2 py-1 rounded-full border border-emerald-500/30 hidden">
                        <i class="fas fa-rupee-sign mr-0.5"></i> <span id="livePriceValue">--</span>
                    </span>
                </div>
                <p class="text-slate-500 text-xs mt-1">
                    <i class="fas fa-microchip text-cyan-400/60"></i> Neural analysis · Real-time API
                </p>
            </div>
            <div class="text-right mt-2 md:mt-0">
                <div class="text-[10px] text-slate-500 flex items-center gap-2 justify-end">
                    <i class="fas fa-circle text-green-500 text-[6px]"></i>
                    <span>API connected</span>
                    <span id="apiStatus" class="text-green-400 text-[9px]">● LIVE</span>
                </div>
                <div class="text-[10px] font-mono text-cyan-300/70 mt-0.5" id="currentDate"></div>
            </div>
        </div>

        <!-- KPI Dashboard - Will be populated dynamically -->
        <div id="kpiGrid" class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-2.5 mb-5">
            <div class="glass-card rounded-xl p-2.5 col-span-full text-center">
                <div class="spinner mx-auto" style="width: 30px; height: 30px;"></div>
                <p class="text-xs text-slate-400 mt-2">Loading market data...</p>
            </div>
        </div>
        
        <!-- AI Insight -->
        <div id="insightBox" class="bg-gradient-to-r from-cyan-500/5 to-blue-500/5 rounded-lg p-3 mb-5 flex items-start gap-2 border-l-3 border-cyan-400 hidden">
            <i class="fas fa-robot text-cyan-400 text-sm mt-0.5"></i>
            <div class="flex-1">
                <span class="text-[9px] font-bold text-cyan-300 uppercase">NEURAL INSIGHT</span>
                <p id="insightText" class="text-slate-300 text-xs leading-relaxed"></p>
            </div>
        </div>
        
        <!-- Indicator Toggles + Timeframe -->
        <div class="flex flex-wrap justify-between items-center gap-2 mb-4">
            <div class="flex flex-wrap gap-1.5">
                <button onclick="toggleIndicator('ma')" id="toggleMa" class="indicator-toggle active px-3 py-1 rounded-md text-[11px] font-medium">
                    <i class="fas fa-chart-line mr-1 text-[9px]"></i> MA20
                </button>
                <button onclick="toggleIndicator('ema')" id="toggleEma" class="indicator-toggle active px-3 py-1 rounded-md text-[11px] font-medium">
                    <i class="fas fa-chart-line mr-1 text-[9px]"></i> EMA9
                </button>
                <button onclick="toggleIndicator('volume')" id="toggleVolume" class="indicator-toggle active px-3 py-1 rounded-md text-[11px] font-medium">
                    <i class="fas fa-chart-bar mr-1 text-[9px]"></i> Volume
                </button>
                <button onclick="toggleIndicator('rsi')" id="toggleRsi" class="indicator-toggle active px-3 py-1 rounded-md text-[11px] font-medium">
                    <i class="fas fa-waveform mr-1 text-[9px]"></i> RSI
                </button>
            </div>
            <div class="flex flex-wrap gap-1.5">
                <button onclick="changeTF('1mo','1d')" class="timeframe-btn px-3 py-1 rounded-md text-[11px]">1M</button>
                <button onclick="changeTF('3mo','1d')" class="timeframe-btn px-3 py-1 rounded-md text-[11px]">3M</button>
                <button onclick="changeTF('6mo','1d')" class="timeframe-btn px-3 py-1 rounded-md text-[11px]">6M</button>
                <button onclick="changeTF('1y','1d')" class="timeframe-btn px-3 py-1 rounded-md text-[11px]">1Y</button>
                <button onclick="changeTF('5d','5m')" class="timeframe-btn px-3 py-1 rounded-md text-[11px]">5m</button>
                <button onclick="changeTF('1d','1m')" class="timeframe-btn px-3 py-1 rounded-md text-[11px]">1m</button>
            </div>
        </div>
        
        <!-- Chart Container -->
        <div class="chart-container relative" style="min-height: 620px;">
            <div id="loadingSkeleton" class="loading-skeleton">
                <div class="spinner"></div>
                <p class="text-slate-500 text-xs">Loading neural chart...</p>
            </div>
            <div id="chart" class="w-full h-[620px]"></div>
        </div>
        
        <!-- Footer -->
        <div class="flex flex-wrap justify-between items-center mt-3 text-[10px] text-slate-500 px-1">
            <div class="flex gap-3">
                <span><i class="fas fa-chart-simple text-green-400 text-[9px]"></i> Candlestick</span>
                <span><i class="fas fa-chart-line text-cyan-300 text-[9px]"></i> MA20 · EMA9</span>
                <span><i class="fas fa-chart-bar text-purple-400 text-[9px]"></i> Volume</span>
                <span><i class="fas fa-waveform text-yellow-400 text-[9px]"></i> RSI</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-chart-simple text-emerald-400 text-[9px]"></i>
                <span>▲ BUY ▼ SELL signals</span>
            </div>
        </div>
    </main>
    
    <div id="toastContainer"></div>
    
    <script>
        const SYMBOL = '{{ symbol }}';
        let chartData = null;
        let currentZoom = null;
        let traces = {};
        let volumeColors = [];
        let currentPrice = 0;
        
        // Toast notification
        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'border-red-500' : 'border-green-500'}`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i>${message}`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 2 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = Math.random() * 15 + 15 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // Time update
        function updateTime() {
            const now = new Date();
            const timeEl = document.getElementById('liveTime');
            const dateEl = document.getElementById('currentDate');
            if (timeEl) timeEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // Fetch full chart data from API
        async function fetchChartData() {
            try {
                const response = await fetch(`/api/stock-data/${SYMBOL}?period=3mo&interval=1d`);
                const data = await response.json();
                if (data.error) {
                    showToast(data.error, 'error');
                    return null;
                }
                return data;
            } catch (error) {
                console.error('Fetch error:', error);
                showToast('Failed to load chart data', 'error');
                return null;
            }
        }
        
        // Fetch live price
        async function fetchLivePrice() {
            try {
                const response = await fetch(`/api/live-price/${SYMBOL}`);
                const data = await response.json();
                if (!data.error && data.price) {
                    document.getElementById('livePriceValue').textContent = `₹${data.price.toFixed(2)}`;
                    document.getElementById('livePriceValue').parentElement.classList.add('price-update');
                    setTimeout(() => document.getElementById('livePriceValue').parentElement.classList.remove('price-update'), 250);
                    
                    // Update price line if chart exists
                    if (chartData) {
                        Plotly.relayout('chart', {
                            'shapes[0].y0': data.price,
                            'shapes[0].y1': data.price,
                            'annotations[0].text': `₹${data.price.toFixed(2)}`,
                            'annotations[0].y': data.price
                        });
                    }
                }
            } catch (error) {
                console.error('Live price error:', error);
            }
        }
        
        // Update KPI dashboard
        function updateKPI(data) {
            const lastIdx = data.close.length - 1;
            const signal = data.signals[lastIdx];
            const rsiVal = data.rsi[lastIdx];
            const price = data.current_price;
            const firstPrice = data.close[0];
            const profit = ((price - firstPrice) / firstPrice * 100).toFixed(2);
            const accuracy = Math.round(70 + (rsiVal > 50 ? 20 : 0));
            const riskVal = Math.round(100 - accuracy + Math.abs(rsiVal - 50) / 5);
            
            const kpiHtml = `
                <div class="glass-card rounded-xl p-2.5">
                    <div class="text-slate-500 text-[10px] uppercase flex items-center gap-1">
                        <i class="fas fa-bolt text-cyan-400 text-[9px]"></i> Signal
                    </div>
                    <div class="mt-1">
                        <span class="signal-${signal.toLowerCase()} px-2.5 py-0.5 inline-block rounded-full text-[11px] font-bold shadow">
                            <i class="fas ${signal === 'BUY' ? 'fa-arrow-up' : signal === 'SELL' ? 'fa-arrow-down' : 'fa-pause'} mr-0.5 text-[9px]"></i>
                            ${signal}
                        </span>
                    </div>
                    <div class="text-[8px] text-slate-500 mt-1.5 flex justify-between">
                        <span>Confidence</span>
                        <span class="text-cyan-400">${accuracy}%</span>
                    </div>
                    <div class="w-full bg-slate-700/50 rounded-full h-1 mt-1">
                        <div class="bg-cyan-400 h-1 rounded-full" style="width: ${accuracy}%"></div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-2.5">
                    <div class="text-slate-500 text-[10px] uppercase"><i class="fas fa-waveform"></i> Pattern</div>
                    <div class="text-cyan-300 mt-0.5 text-sm font-bold truncate">${data.pattern || 'Sideways'}</div>
                    <div class="text-[8px] text-slate-500 mt-1">AI detected</div>
                </div>
                <div class="glass-card rounded-xl p-2.5">
                    <div class="text-slate-500 text-[10px] uppercase"><i class="fas fa-chart-line"></i> P&L</div>
                    <div class="text-sm font-bold ${profit >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${profit >= 0 ? '+' : ''}${profit}%</div>
                    <div class="text-[8px] text-slate-500">since inception</div>
                </div>
                <div class="glass-card rounded-xl p-2.5">
                    <div class="text-slate-500 text-[10px] uppercase"><i class="fas fa-gauge-high"></i> RSI</div>
                    <div class="text-white text-sm font-bold">${rsiVal.toFixed(1)}</div>
                    <div class="w-full bg-slate-700 rounded-full h-1 mt-1.5">
                        <div class="h-1 rounded-full ${rsiVal > 70 ? 'bg-red-500' : rsiVal < 30 ? 'bg-green-500' : 'bg-cyan-400'}" style="width: ${Math.min(100, rsiVal)}%"></div>
                    </div>
                </div>
                <div class="glass-card rounded-xl p-2.5">
                    <div class="text-slate-500 text-[10px] uppercase"><i class="fas fa-brain"></i> Accuracy</div>
                    <div class="text-blue-300 text-sm font-bold">${accuracy}%</div>
                    <div class="text-[8px] text-slate-500">rolling 30d</div>
                </div>
                <div class="glass-card rounded-xl p-2.5">
                    <div class="text-slate-500 text-[10px] uppercase"><i class="fas fa-shield-alt"></i> Risk</div>
                    <div class="text-sm font-bold ${riskVal < 40 ? 'text-green-300' : riskVal < 70 ? 'text-yellow-300' : 'text-red-300'}">${riskVal}</div>
                    <div class="text-[8px] text-slate-500">score</div>
                </div>
            `;
            
            document.getElementById('kpiGrid').innerHTML = kpiHtml;
            
            // Update live price badge
            document.getElementById('livePriceValue').textContent = `₹${price.toFixed(2)}`;
            document.getElementById('livePriceBadge').classList.remove('hidden');
            
            // Update insight
            document.getElementById('insightText').textContent = data.pattern === 'Breakout' ? 
                '🚀 Breakout detected above resistance! Strong bullish momentum with increasing volume.' :
                '📊 Consolidation phase. Watch for breakout above resistance or breakdown below support.';
            document.getElementById('insightBox').classList.remove('hidden');
        }
        
        // Initialize chart with data
        async function initChart() {
            document.getElementById('loadingSkeleton').style.display = 'flex';
            
            chartData = await fetchChartData();
            if (!chartData) {
                document.getElementById('loadingSkeleton').innerHTML = '<p class="text-red-400 text-xs">Failed to load chart data. Check if server is running.</p>';
                return;
            }
            
            currentPrice = chartData.current_price;
            
            // Update volume colors
            volumeColors = chartData.close.map((c, i) => i > 0 ? (c > chartData.close[i-1] ? '#22c55e' : '#ef4444') : '#3b82f6');
            
            // Buy/Sell markers
            const buyMarkers = { x: [], y: [], text: [], mode: 'markers+text', name: 'BUY',
                marker: { symbol: 'triangle-up', size: 12, color: '#22c55e', line: { width: 1, color: 'white' } },
                textposition: 'top center', textfont: { size: 8, color: '#22c55e' }
            };
            
            const sellMarkers = { x: [], y: [], text: [], mode: 'markers+text', name: 'SELL',
                marker: { symbol: 'triangle-down', size: 12, color: '#ef4444', line: { width: 1, color: 'white' } },
                textposition: 'bottom center', textfont: { size: 8, color: '#ef4444' }
            };
            
            for (let i = 0; i < chartData.signals.length; i++) {
                if (chartData.signals[i] === "BUY") {
                    buyMarkers.x.push(chartData.dates[i]);
                    buyMarkers.y.push(chartData.close[i]);
                    buyMarkers.text.push('BUY');
                }
                if (chartData.signals[i] === "SELL") {
                    sellMarkers.x.push(chartData.dates[i]);
                    sellMarkers.y.push(chartData.close[i]);
                    sellMarkers.text.push('SELL');
                }
            }
            
            const support = Math.min(...chartData.close.slice(-20));
            const resistance = Math.max(...chartData.close.slice(-20));
            
            const candleTrace = {
                x: chartData.dates, open: chartData.open, high: chartData.high,
                low: chartData.low, close: chartData.close,
                type: 'candlestick', name: 'Price', showlegend: true,
                increasing: { line: { color: '#22c55e', width: 1.2 }, fillcolor: '#22c55e' },
                decreasing: { line: { color: '#ef4444', width: 1.2 }, fillcolor: '#ef4444' },
                whiskerwidth: 0.7,
                hovertemplate: 'Open: ₹%{open:.2f}<br>High: ₹%{high:.2f}<br>Low: ₹%{low:.2f}<br>Close: ₹%{close:.2f}<extra></extra>'
            };
            
            const maTrace = {
                x: chartData.dates, y: chartData.ma20, type: 'scatter', mode: 'lines', name: 'MA20',
                line: { color: '#facc15', width: 1.8 }, visible: true
            };
            
            const emaTrace = {
                x: chartData.dates, y: chartData.ema9, type: 'scatter', mode: 'lines', name: 'EMA9',
                line: { color: '#38bdf8', width: 1.6, dash: 'dot' }, visible: true
            };
            
            const volumeTrace = {
                x: chartData.dates, y: chartData.volume, type: 'bar', name: 'Volume', yaxis: 'y2',
                marker: { color: volumeColors, opacity: 0.55 }, visible: true,
                hovertemplate: 'Volume: %{y:,.0f}<extra></extra>'
            };
            
            const rsiTrace = {
                x: chartData.dates, y: chartData.rsi, type: 'scatter', mode: 'lines', name: 'RSI (14)',
                line: { color: '#eab308', width: 1.8 }, yaxis: 'y3', fill: 'tozeroy',
                fillcolor: 'rgba(234,179,8,0.06)', visible: true,
                hovertemplate: 'RSI: %{y:.1f}<extra></extra>'
            };
            
            const rsiUpper = {
                x: chartData.dates, y: Array(chartData.dates.length).fill(70), type: 'scatter', mode: 'lines',
                name: 'Overbought', line: { color: '#ef4444', width: 1, dash: 'dash' }, yaxis: 'y3', showlegend: true
            };
            
            const rsiLower = {
                x: chartData.dates, y: Array(chartData.dates.length).fill(30), type: 'scatter', mode: 'lines',
                name: 'Oversold', line: { color: '#22c55e', width: 1, dash: 'dash' }, yaxis: 'y3', showlegend: true
            };
            
            const layout = {
                paper_bgcolor: '#010514', plot_bgcolor: '#010514',
                font: { family: 'Inter', color: '#94a3b8', size: 10 },
                title: { text: `<b>${SYMBOL}</b> · Neural Technical Analysis`, font: { size: 12, color: '#cbd5e1' }, x: 0.01, xanchor: 'left' },
                margin: { t: 45, b: 40, l: 50, r: 65 },
                hovermode: 'closest',
                grid: { rows: 3, columns: 1, pattern: 'independent', roworder: 'top to bottom' },
                yaxis: { domain: [0.45, 0.94], title: 'Price (₹)', side: 'right', showspikes: true, spikecolor: '#38bdf8' },
                yaxis2: { domain: [0.25, 0.42], title: 'Volume', side: 'right' },
                yaxis3: { domain: [0.05, 0.22], title: 'RSI', range: [0, 100], tickvals: [0,30,50,70,100] },
                xaxis: { type: 'date', showspikes: true, spikecolor: '#38bdf8' },
                shapes: [
                    { type: 'line', x0: chartData.dates[0], x1: chartData.dates[chartData.dates.length-1], y0: chartData.current_price, y1: chartData.current_price, line: { color: '#22c55e', width: 1.2, dash: 'dot' } },
                    { type: 'line', y0: resistance, y1: resistance, x0: chartData.dates[0], x1: chartData.dates[chartData.dates.length-1], line: { color: '#ef4444', width: 0.8, dash: 'dash' } },
                    { type: 'line', y0: support, y1: support, x0: chartData.dates[0], x1: chartData.dates[chartData.dates.length-1], line: { color: '#22c55e', width: 0.8, dash: 'dash' } }
                ],
                annotations: [{
                    x: chartData.dates[chartData.dates.length-1], y: chartData.current_price,
                    text: `₹${chartData.current_price.toFixed(2)}`, showarrow: false, xanchor: 'left', xshift: 5,
                    bgcolor: '#22c55e', bordercolor: 'white', borderwidth: 1, borderpad: 3,
                    font: { color: 'white', size: 9 }
                }],
                legend: { orientation: 'h', yanchor: 'bottom', y: -0.1, xanchor: 'center', x: 0.5, bgcolor: 'rgba(2,6,23,0.7)', font: { size: 8 } }
            };
            
            const traces = [candleTrace, maTrace, emaTrace, volumeTrace, rsiTrace, rsiUpper, rsiLower, buyMarkers, sellMarkers];
            
            Plotly.newPlot('chart', traces, layout, { responsive: true, displaylogo: false }).then(() => {
                document.getElementById('loadingSkeleton').style.display = 'none';
                gsap.from('#chart', { duration: 0.4, opacity: 0, y: 15, ease: 'power2.out' });
                
                document.getElementById('chart').on('plotly_relayout', (eventdata) => {
                    if (eventdata['xaxis.range[0]'] && eventdata['xaxis.range[1]']) {
                        currentZoom = [eventdata['xaxis.range[0]'], eventdata['xaxis.range[1]']];
                    }
                });
            });
            
            updateKPI(chartData);
            
            // Store traces globally for toggles
            window.maTrace = maTrace;
            window.emaTrace = emaTrace;
            window.volumeTrace = volumeTrace;
            window.rsiTrace = rsiTrace;
        }
        
        // Indicator toggle
        function toggleIndicator(type) {
            let trace, idx;
            if (type === 'ma') { trace = window.maTrace; idx = 1; }
            else if (type === 'ema') { trace = window.emaTrace; idx = 2; }
            else if (type === 'volume') { trace = window.volumeTrace; idx = 3; }
            else if (type === 'rsi') { trace = window.rsiTrace; idx = 4; }
            
            if (trace) {
                trace.visible = !trace.visible;
                Plotly.restyle('chart', { visible: [trace.visible] }, [idx]);
                document.getElementById(`toggle${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.toggle('active', trace.visible);
            }
        }
        
        function changeTF(tf, interval) {
            window.location.href = `/stock/${SYMBOL}?tf=${tf}&int=${interval}`;
        }
        
        window.toggleIndicator = toggleIndicator;
        window.changeTF = changeTF;
        
        window.addEventListener('resize', () => {
            if (document.getElementById('chart')) Plotly.relayout('chart', {});
        });
        
        // Start the app
        initChart();
        
        // Live price updates every 10 seconds
        setInterval(fetchLivePrice, 10000);
        
        console.log('🧠 Neural Terminal Pro — API-Connected Chart Loaded');
    </script>
</body>
</html>
